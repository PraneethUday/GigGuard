services:
  # ── Web API ────────────────────────────────────────────────
  - type: web
    name: gigguard-data-api
    runtime: python
    region: singapore
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: OWM_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.12"

  # ── Cron Job: generate platform data every 15 minutes ─────
  - type: cron
    name: gigguard-tick
    runtime: python
    region: singapore
    rootDir: backend
    schedule: "*/15 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python cron_tick.py
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: OWM_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.12"
